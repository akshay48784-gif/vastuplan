<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini API Tester</title>
<style>
  body { font-family: sans-serif; background: #111; color: #fff; padding: 20px; }
  input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 14px; }
  input { background: #222; color: #fff; border: 1px solid #444; }
  button { background: #c9a84c; color: #000; font-weight: bold; cursor: pointer; }
  #result { margin-top: 16px; padding: 16px; background: #1a1a2e; border-radius: 8px; white-space: pre-wrap; font-size: 13px; min-height: 60px; }
  .ok { color: #4caf82; } .err { color: #ef5050; }
</style>
</head>
<body>
<h2>🔑 Gemini API Key Tester</h2>
<p style="color:#aaa;font-size:13px">Paste your key and tap Test to find which model works</p>
<input type="text" id="key" placeholder="Paste your AIza... key here" />
<button onclick="testAll()">▶ Test All Models</button>
<div id="result">Results will appear here...</div>

<script>
const models = [
  'gemini-2.0-flash-lite',
  'gemini-2.0-flash',
  'gemini-1.5-flash',
  'gemini-1.5-flash-latest',
  'gemini-1.5-pro-latest',
  'gemini-1.0-pro'
];

async function testModel(key, model, version) {
  try {
    const r = await fetch(
      `https://generativelanguage.googleapis.com/${version}/models/${model}:generateContent?key=${key}`,
      {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({contents:[{parts:[{text:'Say: WORKS'}]}], generationConfig:{maxOutputTokens:20}})
      }
    );
    const d = await r.json();
    if (d.candidates?.[0]?.content?.parts?.[0]?.text) return '✅ WORKS';
    return '❌ ' + (d.error?.message || 'No response');
  } catch(e) {
    return '❌ ' + e.message;
  }
}

async function testAll() {
  const key = document.getElementById('key').value.trim();
  if (!key) { alert('Paste your API key first!'); return; }
  const res = document.getElementById('result');
  res.innerHTML = '⏳ Testing all models...';
  let output = '';
  for (const model of models) {
    for (const v of ['v1','v1beta']) {
      res.innerHTML = `⏳ Testing ${model} (${v})...`;
      const result = await testModel(key, model, v);
      const line = `${result} — ${model} (${v})\n`;
      output += line;
      res.innerHTML = output;
      if (result.includes('WORKS')) {
        res.innerHTML += `\n🎉 USE THIS MODEL: ${model} with ${v}`;
        return;
      }
      await new Promise(r => setTimeout(r, 500));
    }
  }
  res.innerHTML = output + '\n\n⚠️ No model worked. Check your API key.';
}
</script>
</body>
</html>
