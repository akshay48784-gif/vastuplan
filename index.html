<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VastuPlan AI</title>

<style>
body{background:#08111e;color:white;font-family:Arial;padding:40px}
button{padding:12px 20px;background:#c9a84c;border:none}
</style>
</head>

<body>

<h2>VastuPlan AI</h2>

<input id="apiKey" placeholder="Paste Gemini API Key here" style="width:300px;padding:10px">
<br><br>
<button onclick="generatePlan()">Generate Plan</button>

<pre id="output"></pre>

<script>

function validateRooms(data){

 if(!data.rooms) throw new Error("No rooms generated")

 const rooms = data.rooms

 for(let i=0;i<rooms.length;i++){

   const r = rooms[i]

   if(r.x < 0 || r.y < 0)
     throw new Error("Room outside plot")

   if(r.x + r.w > data.plotWidth)
     throw new Error("Room exceeds plot width")

   if(r.y + r.h > data.plotDepth)
     throw new Error("Room exceeds plot depth")

   for(let j=i+1;j<rooms.length;j++){

     const r2 = rooms[j]

     const overlap =
       r.x < r2.x + r2.w &&
       r.x + r.w > r2.x &&
       r.y < r2.y + r2.h &&
       r.y + r.h > r2.y

     if(overlap)
       throw new Error("Rooms overlapping")
   }
 }

}

async function generatePlan(){

 const key = document.getElementById("apiKey").value.trim()

 if(!key) return alert("Enter API Key")

 const prompt = `
You are an expert architect.

Generate JSON floor plan.

RULES:
- Rooms must NOT overlap
- Leave 1ft wall thickness
- Ensure circulation path
- Fit within 40x60 plot

Return ONLY JSON.
`

 const res = await fetch(
  "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+key,
  {
   method:"POST",
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({
     contents:[{parts:[{text:prompt}]}]
   })
  }
 )

 const data = await res.json()

 let text = data.candidates[0].content.parts[0].text

 text = text.replace(/```json/g,'').replace(/```/g,'')

 const json = JSON.parse(text)

 validateRooms(json)

 document.getElementById("output").textContent =
 JSON.stringify(json,null,2)

}

</script>

</body>
</html>
